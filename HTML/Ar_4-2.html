<!DOCTYPE html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8">
        <title>niganmahaihaiyo</title>
        <style type="text/css">
            #container{
                margin: 0 auto;
                width: 90%;
                box-sizing: border-box;
            }
            header{
                position: relative;
                height: 100px;
                background: #6cf;
            }
            nav{
                height: 30px;
                background: rgb(0, 130, 224);
                text-align: center;
            }
            .content{
                height:1500px;
            }
            aside{
                float: left;
                width: 10%;
                height: 1500px;
                background: #6cf;
            }
            main{
                position: relative;
                float: left;
                width: 80%;
                height: 1500px;
                z-index: 1;
                background: rgb(180, 230, 255)
            }
            footer{
                height: 60px;
                background: #6cf;
            }
            .ba_top{
                width: auto;
                height: auto;
            }
            .ba_tb-1{
                position: absolute;
                top: 10px;
                right: 260px;
                width: 80px;
                height: 80px;
            }
            .ba_tb-2{
                position: absolute;
                top: 10px;
                right: 150px;
                width: 80px;
                height: 80px;
            }
            .ba_tb-3{
                position: absolute;
                top: 10px;
                right: 50px;
                width: 80px;
                height: 80px;
            }
            .bg_1{
                position: absolute;
                top: 4%;
                left: 10%;
                background-color: gainsboro;
                width: 66.5%;
                height: 20%;
                z-index: 10;
                border-radius: 20px;
            }
            .bg_1-1{
                position: absolute;
                top: 10%;
                right: 20%;
                width: 120px;

            .bg_2{
                position: absolute;
                top: 28%;

                background-color: gainsboro;
                width: 66.5%;
                height: 20%;
                z-index: 10;
                border-radius: 20px;
            }
            .bg_2-2{
                position: absolute;
                top: 34%;
                left: 20%;
                width: 120px;
                height: 120px;
                z-index: 11;
                border-radius: 20px;
            }
            .bg_3{
                position: absolute;
                top: 52%;
                left: 10%;
                background-color: gainsboro;
                width: 66.5%;
                height: 20%;
                z-index: 10;
                border-radius: 20px;
            }
            .bg_3-3{
                position: absolute;
                bottom: 34%;

                width: 120px;

                z-index: 11;
                border-radius: 20px;
            }
            .bg_4{

                bottom: 4%;
                right: 10%;

    <body>
        <div id="container">
            <header><img src="sucai/BlueArchive_top-gigapixel-standard v2-120h.png" alt="ba_top" class="ba_top">
            <img src="sucai/emoji/1-gigapixel-low resolution v2-120h.png" alt="emoji_1" class="ba_tb-1">
        <img src="sucai/emoji/2-gigapixel-low resolution v2-120h.png" alt="emoji_2" class="ba_tb-2">
