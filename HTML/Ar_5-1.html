<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>flexbox</title>
    <style>
        .flex-container {
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            align-items: center;
            height: 600px;
            background-color: lightblue;
            border: 1px solid blue;
            border-radius: 8px;
        }

        .input-row {
            width: 80%;
            height: 100px;
            font-size: 20px;
            background-color: lightcoral;
            border: 1px solid red;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 0 15px;
            box-sizing: border-box;
        }

        .phone-row {
            width: 80%;
            height: 100px;
            font-size: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            justify-content: space-between;
            padding: 0 15px;
            box-sizing: border-box;
        }

        .phone-input {
            flex: 1;
            height: 100%;
            background-color: lightcoral;
            border: 1px solid red;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 0 15px;
            box-sizing: border-box;
        }

        .bottom {
            width: 120px;
            height: 100%;
            font-size: 16px;
            background-color: lightcoral;
            border: 1px solid red;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
        }

        input {
            flex: 1;
            height: 30px;
            border: 1px solid #ccc;
            border-radius: 4px;
            padding: 0 8px;
            box-sizing: border-box;
        }
    </style>
</head>

<body>
    <div class="flex-container">
        <div class="input-row">
            <label for="username">用户名</label>
            <input type="text" id="username">
        </div>
        <div class="input-row">
            <label for="password">密码</label>
            <input type="password" id="password">
        </div>
        <div class="phone-row">
            <div class="phone-input">
                <label for="cellphone">手机号</label>
                <input type="text" id="cellphone">
            </div>
            <div class="bottom">获取验证码</div>
        </div>
    </div>

</body>

</html>
